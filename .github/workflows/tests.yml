name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      # Install with pip (not the Poetry lock) so each Python version resolves
      # its own compatible numpy/scipy/scikit-learn wheels. A single universal
      # poetry.lock pins one version set that cannot provide wheels across the
      # whole 3.10-3.14 range (e.g. scipy with cp314 wheels requires >=3.11).
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov coverage
      - name: Run tests with coverage
        run: pytest --cov=cgmm --cov-report=xml --cov-report=term-missing
        env:
          PYTHONHASHSEED: "0"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: true
          use_oidc: true
          disable_search: true
          slug: sitmo/cgmm
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}


